blueprint:
  name: Motion-activated Light (with Bright/Dim Sensor)
  description: Turn on a light when motion is detected and the room is dim. Includes delay for slow sensors.
  domain: automation
  source_url: https://raw.githubusercontent.com/james-stevens/home-assistant-blueprints/refs/heads/master/motion_light_dim_sensor.yaml
  author: James Stevens (adapted from Home Assistant)
  input:
    motion_entity:
      name: Motion Sensor
      selector:
        entity:
          filter:
            - device_class: occupancy
              domain: binary_sensor
            - device_class: motion
              domain: binary_sensor

    light_sensor:
      name: Light Sensor
      description: Your illumination sensor (sensor.porch_pir_illumination)
      selector:
        entity:
          filter:
            - domain: sensor
            - domain: binary_sensor

    dim_state:
      name: "Dim State"
      description: What state means the room is dark enough
      selector:
        select:
          options:
            - ""
            - "dim"
            - "bright"
            - "dark"
            - "low"
            - "on"
            - "off"

    light_entity:
      name: Light
      description: The light to control (create a Light Group if you need multiple lights)
      selector:
        entity:
          domain: light

    no_motion_wait:
      name: Wait time
      description: Time to leave the light on after last motion is detected.
      default: 120
      selector:
        number:
          min: 0
          max: 3600
          unit_of_measurement: seconds

mode: restart
max_exceeded: silent

triggers:
  - trigger: state
    entity_id: !input motion_entity
    from: "off"
    to: "on"

actions:
  - alias: "Wait for illumination sensor to update"
    delay:
      milliseconds: 1000

  - alias: "Check if room is dim OR light is already on"
    condition: or
    conditions:
      - condition: state
        entity_id: !input light_sensor
        state: !input dim_state
      - condition: state
        entity_id: !input light_entity
        state: "on"

  - alias: "Turn on the light"
    action: light.turn_on
    target:
      entity_id: !input light_entity

  - alias: "Wait until there is no motion"
    wait_for_trigger:
      trigger: state
      entity_id: !input motion_entity
      from: "on"
      to: "off"

  - alias: "Wait the configured time"
    delay: !input no_motion_wait

  - alias: "Turn off the light"
    action: light.turn_off
    target:
      entity_id: !input light_entity
