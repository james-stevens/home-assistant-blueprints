---
blueprint:
  name: Motion-activated Light (with Bright/Dim Sensor)
  description: Turn on a light when motion is detected and the room is dim.
  domain: automation
  source_url: https://raw.githubusercontent.com/james-stevens/home-assistant-blueprints/refs/heads/master/motion_light_dim_sensor.yaml
  author: Home Assistant (adapted)
  input:
    motion_entity:
      name: Motion Sensor
      selector:
        entity:
          filter:
            - device_class: occupancy
              domain: binary_sensor
            - device_class: motion
              domain: binary_sensor

    light_sensor:
      name: Light Sensor
      description: Your illumination sensor (sensor.porch_pir_illumination)
      selector:
        entity:
          filter:
            - domain: sensor
            - domain: binary_sensor

    dim_state:
      name: "Dim State"
      description: What state means the room is dark enough (e.g. "dim")
      selector:
        select:
          options:
            - ""
            - "dim"
            - "bright"
            - "dark"
            - "low"
            - "on"
            - "off"

    light_target:
      name: Light
      selector:
        target:
          entity:
            domain: light

    no_motion_wait:
      name: Wait time
      description: Time to leave the light on after last motion is detected.
      default: 120
      selector:
        number:
          min: 0
          max: 3600
          unit_of_measurement: seconds

mode: restart
max_exceeded: silent

triggers:
  - trigger: state
    entity_id: !input motion_entity
    from: "off"
    to: "on"

actions:
  - alias: "Wait for the illumination to report"
    delay:
      milliseconds: 1000

  - alias: "Check if room is dim"
    condition: state
    entity_id: !input light_sensor
    state: !input dim_state

  - alias: "Turn on the light"
    action: light.turn_on
    target: !input light_target

  - alias: "Wait until there is no motion"
    wait_for_trigger:
      trigger: state
      entity_id: !input motion_entity
      from: "on"
      to: "off"

  - alias: "Wait the configured time"
    delay: !input no_motion_wait

  - alias: "Turn off the light"
    action: light.turn_off
    target: !input light_target
